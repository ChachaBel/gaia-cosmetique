<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Commandes</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:14px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#6e2732;
color:white;
}

tr:hover{
background:#f5f5f5;
cursor:pointer;
}

.status{
padding:5px 10px;
border-radius:8px;
color:white;
font-size:14px;
}

.pending{
background:orange;
}

.confirmed{
background:green;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.confirm{
background:green;
color:white;
}

.delete{
background:red;
color:white;
}

</style>

</head>

<body>

<h1>📦 Commandes</h1>

<table>

<thead>

<tr>
<th>Nom</th>
<th>Téléphone</th>
<th>Adresse</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="ordersTable"></tbody>

</table>

<script type="module">

import { db } from "../firebase/firebase.js"

import {
collection,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const table = document.getElementById("ordersTable")

const querySnapshot = await getDocs(collection(db,"orders"))

querySnapshot.forEach((docu)=>{

const data = docu.data()

const status = data.status || "pending"

table.innerHTML += `

<tr onclick="openOrder('${docu.id}')">

<td>${data["nom et prénom"]}</td>
<td>${data.phone}</td>
<td>${data.adresse}</td>

<td>
<span class="status ${status}">
${status}
</span>
</td>

<td>

<button class="confirm"
onclick="event.stopPropagation();confirmOrder('${docu.id}')">
✔
</button>

<button class="delete"
onclick="event.stopPropagation();deleteOrder('${docu.id}')">
❌
</button>

</td>

</tr>

`
})

window.deleteOrder = async function(id){

await deleteDoc(doc(db,"orders",id))

location.reload()

}

window.confirmOrder = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"confirmed"
})

location.reload()

}

window.openOrder = function(id){

window.location.href = "order.html?id=" + id

}

</script>

</body>
</html>
